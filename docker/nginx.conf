# Nginx reverse proxy configuration for Solidity Smart Audit.
# Routes:
#   /api/auth/*    → Next.js :3000  (NextAuth.js v5 OAuth routes)
#   /api/scan      → Next.js :3000  (scan proxy route — injects userId from session)
#   /api/history   → Next.js :3000  (user history — requires session check)
#   /api/*         → Express :3001  (core scan API, health, raw scan result lookup)
#   /              → Next.js :3000  (all other pages)
# Logs to stdout/stderr so Docker captures them via the logging driver.

gzip on;
gzip_types text/plain application/json application/javascript text/css;
gzip_min_length 1000;

server {
    listen 80;
    server_name _;

    # Increase body size limit for large contract repo payloads
    client_max_body_size 10m;

    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    # NextAuth.js OAuth routes — must be served by Next.js, not Express
    location /api/auth/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Scan submission — handled by Next.js Route Handler (injects userId from session)
    location = /api/scan {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # User history — handled by Next.js Route Handler (requires session check)
    location = /api/history {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Express API — health check and raw scan result lookup
    location /api/ {
        proxy_pass         http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Next.js frontend (including _next/static, _next/image, etc.)
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
