# Nginx reverse proxy configuration for SolidityGuard AI.
# Routes /api/* to Express :3001, everything else to Next.js :3000.
# Logs to stdout/stderr so Docker captures them via the logging driver.

gzip on;
gzip_types text/plain application/json application/javascript text/css;
gzip_min_length 1000;

server {
    listen 80;
    server_name _;

    # Increase body size limit for large contract repo payloads
    client_max_body_size 10m;

    access_log  /dev/stdout;
    error_log   /dev/stderr warn;

    # Express API
    location /api/ {
        proxy_pass         http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s; # Scans can take up to ~60s — give headroom
    }

    # Next.js frontend (including _next/static, _next/image, etc.)
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
